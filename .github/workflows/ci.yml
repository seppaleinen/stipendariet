name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Use Node LTS for CI builds
  NODE_VERSION: "22"

jobs:
  # ── lint & type-check (fast) ──────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # Lint all workspace packages — shared eslint-config is now wired via workspace deps
      - name: Lint
        run: pnpm lint

  # ── test (frontend + admin) ────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # Build shared packages first so @stipendariet/ui dist/ exists for test imports
      - name: Build shared packages
        run: pnpm turbo run build --filter=@stipendariet/types --filter=@stipendariet/ui --filter=@stipendariet/eslint-config

      # Run frontend tests with vitest (has jsdom environment, coverage thresholds)
      - name: Run frontend tests
        working-directory: apps/frontend
        run: npx vitest run

      # Run admin tests with vitest
      - name: Run admin tests
        working-directory: apps/admin
        run: npx vitest run

  # ── build all packages & apps ─────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # Build shared packages first (types, ui), then apps in parallel
      - name: Build all
        run: pnpm turbo run build

  # ── Docker build for backend (multi-platform) ──────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    steps:
      - uses: actions/checkout@v4

      # Python setup for backend linting
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # ── Python lint with ruff ──────────────────────────────
      - name: Lint backend
        working-directory: backend
        run: |
          pip install ruff
          ruff check .

      # ── Backend tests with pytest ──────────────────────────
      - name: Run backend tests
        working-directory: backend
        run: |
          pip install -r requirements.txt pytest pytest-asyncio httpx
          pytest -v

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only push on main branch pushes; for PRs we just test build
      - name: Login to GitHub Container Registry (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image (test only for PRs, push for main)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # NOTE: Frontend and admin Dockerfiles are currently standalone (per-app npm deps).
      # For production monorepo Docker builds, these will need monorepo-aware Dockerfiles
      # that install pnpm and build from the workspace root.
      - name: Build frontend image (main only)
        id: build-frontend
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          dockerfile: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha

      - name: Build admin image (main only)
        id: build-admin
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./apps/admin
          dockerfile: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/admin:latest
            ghcr.io/${{ github.repository }}/admin:${{ github.sha }}
          cache-from: type=gha

      # ── Helm chart publish (main only) ───────────────────────
      - name: Setup Helm
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Login to GHCR for Helm
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push Helm charts (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          CHARTS="backend frontend admin-frontend"
          mkdir -p /tmp/charts
          for chart in $CHARTS; do
            chart_path="kubernetes/charts/stipendiatet/$chart"
            # Set chart version + appVersion from git SHA
            sed -i "s/^version:.*/version: 0.0.0+git.${{ github.sha }}/" "$chart_path/Chart.yaml"
            sed -i "s/^appVersion:.*/appVersion: latest/" "$chart_path/Chart.yaml"
            helm package "$chart_path" -d /tmp/charts
          done
          for chart in $CHARTS; do
            helm push "/tmp/charts/stipendiatet-$chart-*.tgz" "oci://ghcr.io/${{ github.repository }}/charts"
          done
        shell: bash
