apiVersion: v1
kind: Secret
type: Opaque
metadata:
    name: {{ printf "%s-env-secrets" .Release.Name }}
    namespace: {{ .Release.Namespace }}
stringData:
    PYTHONUNBUFFERED: {{ .Values.env.pythonunbuffered | quote  }}
    DATABASE_URL: {{ .Values.env.databaseUrl | quote  }}
    DATABASE_HOST: {{ .Values.env.databaseHost | quote  }}
    DATABASE_PORT: {{ .Values.env.databasePort | quote  }}
    DATABASE_USER: {{ .Values.env.databaseUser | quote  }}
    DATABASE_PASSWORD: {{ .Values.env.databasePassword | quote  }}
    DATABASE_NAME: {{ .Values.env.databaseName | quote  }}
    ADMIN_EMAIL: {{ .Values.env.adminEmail | quote  }}
    ADMIN_PASSWORD: {{ .Values.env.adminPassword | quote  }}
    ADMIN_USERNAME: {{ .Values.env.adminUsername | quote  }}
    JWT_SECRET_KEY: {{ .Values.env.jwtSecretKey | quote }}
    ENGINE_URL: {{ .Values.env.engineUrl | quote }}
    INTERNAL_AUTH_TOKEN: {{ .Values.env.internalAuthToken | quote }}
    OLLAMA_URL: {{ .Values.env.ollamaUrl | quote }}
    OLLAMA_MODEL: {{ .Values.env.ollamaModel | quote }}
